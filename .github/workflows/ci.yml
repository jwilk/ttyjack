name: CI
permissions: {}
on:
- push
- pull_request
jobs:
  main:
    strategy:
      matrix:
        include:
        - os: ubuntu-22.04
          cc: gcc
        - os: ubuntu-22.04
          cc: clang
        - os: ubuntu-24.04
          cc: gcc
          xfail: true  # CONFIG_LEGACY_TIOCSTI=n
        - os: ubuntu-24.04
          cc: clang
          xfail: true  # CONFIG_LEGACY_TIOCSTI=n
        - os: macos-13
          cc: cc
        - os: macos-14
          cc: cc
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v4
    - name: set up APT
      if: startsWith(matrix.os, 'ubuntu-')
      run: |
        printf 'Apt::Install-Recommends "false";\n' | sudo tee -a /etc/apt/apt.conf
        sudo apt-get update
    - name: check C compiler version
      run:
        ${{matrix.cc}} --version
    - name: build
      run:
        make CC=${{matrix.cc}}
    - name: install test deps
      if: startsWith(matrix.os, 'ubuntu-')
      run: |
        sudo apt-get install tmux
    - name: install test deps
      if: startsWith(matrix.os, 'macos-')
      run: |
        brew install tmux
    - name: print Linux config info
      if: startsWith(matrix.os, 'ubuntu-')
      run: |
        uname -a
        grep -w CONFIG_LEGACY_TIOCSTI /boot/config-$(uname -r) || true
    - name: expect test failures
      if: matrix.xfail
      run:
        echo "TTYJACK_TEST_XFAIL=1" >> $GITHUB_ENV
    - name: run tests
      run:
        perl -Mautodie=exec -e '$SIG{PIPE}="DEFAULT"; exec @ARGV'
        make test
    - name: check README syntax
      if: startsWith(matrix.os, 'ubuntu-')
      run: |
        python3 -m pip install restructuredtext-lint pygments
        rst-lint --level=info --encoding=UTF-8 README
    - name: run cppcheck
      if: matrix.cc == 'gcc'
      run: |
        sudo apt-get install cppcheck
        cppcheck --error-exitcode=1 *.c

